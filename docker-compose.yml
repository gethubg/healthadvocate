services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-healthadvocate}
      PDF_STORAGE_DIR: /data/pdfs
      SQLITE_PATH: /data/healthadvocate.db
      CORS_ORIGINS: http://localhost:8080
    volumes:
      - healthadvocate-data:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    environment:
      # Baked at build time; for a different API host, rebuild with VITE_API_BASE set.
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend

volumes:
  healthadvocate-data:
